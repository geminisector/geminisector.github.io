<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gemini Sector Mission Generator</title>
  <link rel="icon" type="image/x-icon" href="../images/favicon.gif">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">
  <style>
    /* Styles for the AI suggestion button */
    .input-with-button-wrapper {
        display: flex;
        align-items: center; /* Vertically align items */
        gap: 5px; /* Space between input and button */
        margin-bottom: 10px; /* Space below the wrapper */
    }

    .input-with-button-wrapper textarea,
    .input-with-button-wrapper input[type="text"] {
        flex-grow: 1; /* Allow input/textarea to take available space */
        width: auto; /* Override default width */
    }

    .grok-ai-button {
        width: 30px; /* Small size */
        height: 30px; /* Small size */
        border-radius: 5px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); /* Purple gradient for Grok */
        color: white;
        border: none;
        cursor: pointer;
        font-size: 1.2em; /* Icon size */
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 0;
        box-sizing: border-box; /* Include padding/border in width/height */
        transition: transform 0.2s ease;
    }

    .grok-ai-button:hover:not(:disabled) {
        background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
        transform: scale(1.1);
    }

    .grok-ai-button:disabled {
        background-color: #cccccc;
        cursor: not-allowed;
        transform: none;
    }

    /* Info banner for Grok AI */
    .ai-info-banner {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 12px 20px;
        border-radius: 8px;
        margin-bottom: 20px;
        display: flex;
        align-items: center;
        gap: 10px;
        box-shadow: 0 2px 8px rgba(102, 126, 234, 0.3);
    }

    .ai-info-banner .icon {
        font-size: 1.5em;
    }

    .ai-info-banner .text {
        flex: 1;
    }

    .ai-info-banner .status {
        font-weight: 600;
        padding: 4px 12px;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 4px;
        font-size: 0.9em;
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>Gemini Sector Mission Generator</h1>
      <div id="aiStatusBanner" class="ai-info-banner" style="display: none;">
        <span class="icon">✨</span>
        <div class="text">
          <strong>AI-Powered Suggestions Available</strong>
          <br>
          <small>Click the ✨ buttons to get creative mission descriptions from Grok AI</small>
        </div>
        <span class="status" id="aiStatus">Checking...</span>
      </div>
    </header>

    <main>
      <form id="jsonForm">
        <div class="form-group">
          <label for="missionName">Name (Optional):</label>
          <input type="text" id="missionName" name="missionName" placeholder="Enter mission name...">
        </div>
        
        <div class="form-group">
          <label for="missionDescription">Mission Description:</label>
          <textarea id="missionDescription" name="missionDescription" rows="15" placeholder="Describe the mission here..."></textarea>
        </div>
        
        <div id="rewardsContainer" class="rewards-container">
          <!-- Reward rows will be added here dynamically -->
        </div>

        <div class="button-group">
          <button type="button" class="add-button" onclick="addReward()">Add Reward</button>
        </div>

        <div id="navPointsContainer" class="nav-points-container">
          </div>
        
        <div class="button-group">
          <button type="button" class="add-button" onclick="addNavPoint()">Add Nav Point</button>
        </div>
        
        <div class="button-group">
          <button type="submit" id="generateJsonBtn" class="primary-button">Generate JSON</button>
          <button type="submit" id="generateBase64Btn" class="secondary-button">Download Encoded</button>
        </div>
      </form>
      
      <div class="generated-output">
        <h2>Generated JSON:</h2>
        <pre id="generatedJson"></pre>
      </div>
    </main>
  </div>
  
  <div id="datalistContainer"></div>
  
  <!-- Load Puter SDK first -->
  <script src="https://js.puter.com/v2/"></script>
  
  <!-- Then load our scripts -->
  <script src="generator.js"></script>
  <script src="grok_autocomplete.js"></script>
  
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
        // Show banner while checking
        const banner = document.getElementById('aiStatusBanner');
        const status = document.getElementById('aiStatus');
        banner.style.display = 'flex';
        status.textContent = 'Checking...';

        // Wait for Puter SDK to be ready and check Grok availability
        await window.GrokIntegration.checkGrokAvailable();

        // Update banner based on availability
        if (window.GrokIntegration.isGrokAvailable) {
            status.textContent = '✓ Ready';
            status.style.background = 'rgba(76, 175, 80, 0.3)';
        } else {
            status.textContent = '✗ Unavailable';
            status.style.background = 'rgba(244, 67, 54, 0.3)';
            banner.querySelector('.text').innerHTML = `
                <strong>AI Suggestions Unavailable</strong>
                <br>
                <small>Grok AI could not be initialized. Check console for details.</small>
            `;
        }

        // Add suggestion button for the main mission description
        const missionDescriptionTextarea = document.getElementById('missionDescription');
        if (missionDescriptionTextarea) {
            window.GrokIntegration.addSuggestionButton(
                missionDescriptionTextarea,
                window.GrokIntegration.MISSION_DESCRIPTION_PROMPT,
                false,
                () => {
                    const jsonForm = document.getElementById('jsonForm');
                    const formData = new FormData(jsonForm);
                    const missionJson = generateJson(formData);
                    return JSON.stringify(missionJson, null, 2);
                }
            );
        }
    });
  </script>
  <script src="../header.js"></script>
  <script src="../footer.js"></script>
</body>
</html>
